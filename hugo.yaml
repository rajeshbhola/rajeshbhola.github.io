    items:
      - job: "Software Engineer I"
        company: "DEEP.io"
        companyUrl: ""
        date: "Apr 2025 - present"
        featuredLink:
          enable: true
          name: "Client: T-Mobile"
          url: "https://t-mobile.com"
        content: |-
          DEEP.io is a messaging platform that provides a comprehensive solution for managing and processing messages across various channels.
          - Message Processing: The platform handles message processing for multiple channels, including SMS, email, and push notifications. 
          - Asynchronous Messaging: The platform utilizes asynchronous messaging to ensure efficient and reliable message delivery.
          - Message Tracking: The platform provides message tracking capabilities, allowing users to monitor the status of messages in real-time.
          - Message Analytics: The platform offers analytics features to analyze message performance and engagement metrics.
          - Integration: The platform integrates with various third-party services and APIs to enhance functionality and provide a seamless user experience.
          - Scalability: The platform is designed to handle high volumes of messages and scale as needed to accommodate growing user demands.
          - Security: The platform implements security measures to protect sensitive data and ensure compliance with industry standards.
          - Auditing: The platform provides auditing capabilities to track message history and changes made to messages. 
          
          Responsibilities:

          - Implemented producer and consumer applications for message processing, ensuring efficient handling of messages across various channels.
          - Developed REST APIs for seamless communication between services, enabling integration with third-party applications.
          - Designed and implemented data streams and tasks for real-time message processing, ensuring timely delivery of messages.
          - Created data pipelines to transfer data from microservices to Kafka, enabling efficient message processing and storage.
          - Contributed to code reviews, ensuring adherence to best practices and high code quality across teams.
          - Participated in requirement discussions and clarification sessions to ensure the system aligns with business needs.
          - Large file upload and download functionality, enabling users to handle large files efficiently.
          - Implemented error handling and messaging for cases where messages could not be processed or delivered.
          - Retry logic for failed messages, ensuring that messages are retried in case of temporary failures.
          - Asynchronous messaging for improved performance and reliability, allowing messages to be processed in the background without blocking the main application flow.

          Technologies: 
          
          Spring Boot, Microservices, Java 17, Kafka, RabbitMQ, REST 
          API, Swagger, Maven, JUnit, Mockito,
          Docker, Kubernetes, Gitlab CI/CD, Splunk, Azure Cloud


      - job: "Software Engineer I"
        company: "QVXP"
        companyUrl: ""
        date: "May 2024 - Apr 2025"
        featuredLink:
          enable: true
          name: "Client: T-Mobile"
          url: "https://t-mobile.com"
        content: |-
          QVXP is a comprehensive retail application designed for order sales and order management. The application 
          handles various sales flows and provides users with the ability to view and manage order details, making it 
          essential for retail users and care users. 
          - Order Sales: The application supports various sales flows including: 
          Device Upgrades, Regular Upgrades, Bulk Upgrades, JUMP Upgrades, Accessory Sales, Coverage Solution 
          Device Sales 
          - Order Management: Provides functionalities for retail users to look up orders and view detailed 
          information. Care users are granted additional permissions to return orders. 
          - Order Lookup: Enables users to load and display retail or care orders based on specific search criteria. 
          - Order Details: Displays detailed order-related information, including payment information, shipping 
          details, item summary, notifications, EIP information, and e-signatures.

          Responsibilities:

          - Implemented the upgrade dashboard for retail users in QVXP, enabling regular and line upgrades after retrieving account data from upstream applications like Atlas. 
          - Developed and integrated a comprehensive search functionality, allowing users to search orders based 
          on multiple criteria, such as mobile number, account number, email, order number, IMEI number, etc. 
          - Incorporated error handling and messaging for cases where search results were not found. 
          - Developed the “View Order Details” feature, which displays detailed information such as payment info, 
          shipping info, item summary, and more when a user selects an order. 
          - Implemented validation for the CVF token coming from upstream applications, restricting access to order 
          search based on token verification. 
          - Designed and implemented the Beastmode feature, which restricts users from searching for accounts or 
          orders of other users, enhancing security and privacy. 
          - Built and integrated a feature that prevents user traffic from proceeding if certain conditions are not met, 
          effectively blocking transactions when necessary. 

          Technologies: 
          
          Spring Boot, Microservices, Java 17, Grails, Groovy, REST 
          API, HTML, CSS, JavaScript, jQuery, GSP, Maven, Spock, 
          Docker, Kubernetes, Gitlab CI/CD, Splunk 


      - job: "Software Engineer I"
        company: "DRO"
        companyUrl: ""
        date: "Nov 2023 - Apr 2024"
        featuredLink:
          enable: true
          name: "Client: T-Mobile"
          url: "https://t-mobile.com"
        info:
          enable: true
        
        content: |
          The SCM DRO project begins a critical journey of modernizing and migrating hundreds of microservices to the latest 
          Spring Boot versions and Java 17. Additionally, we transitioned services relying on RabbitMQ to Kafka, deploying 
          them promptly on the TKE (Tencent Kubernetes Engine) platform. This proactive approach enables TMO to 
          decommission the PCF (Pivotal Cloud Foundry) platform, leading to significant cost savings while ensuring 
          uninterrupted service delivery. 
          
          The DRO (Delivery Reverse Orders) project involves tracking orders created in SAP, from store to warehouse. This 
          project is primarily focused on migrating the existing system from an older version to a newer version and replacing 
          the existing communication functionalities with asynchronous messaging. 
          - Migration: Transitioning from Java 8 to Java 17, ensuring improved performance and new features. 
          - Technology Upgrade: Replacing RabbitMQ with Kafka for asynchronous communication, enhancing 
          scalability and reliability. 
          - Dependency Management: Integrating and upgrading third-party and parent dependencies to keep the 
          system up-to-date. 
          - Service Migration: The project includes migrating 100+ services to newer technologies while maintaining 
          operational continuity.

          Responsibilities: 

          - Transition all microservices to the latest Spring Boot versions and Java 17 to leverage enhanced features, 
          security patches, and performance improvements. 
          - Migrate services dependent on RabbitMQ to Kafka, a scalable and distributed messaging system, to optimize 
          message processing and ensure seamless communication within the microservices ecosystem. 
          - Deploy migrated microservices on the TKE Platform early to facilitate the decommissioning of the PCF 
          platform, thereby reducing operational overheads and maximizing cost efficiencies. 
          - Successfully upgraded all microservices to the latest Spring Boot versions and Java 17, ensuring 
          compatibility with cutting-edge technologies and future scalability. 
          - Seamless migration of services from RabbitMQ to Kafka, enhancing message throughput, fault tolerance, 
          and overall system resilience. 
          - Timely deployment of microservices on the TKE platform, enabling TMO to transition from PCF and realize 
          cost savings without disrupting service delivery.

          Technologies: 
          
          Spring Boot, Microservices, Kafka, RabbitMQ (for 
          migration), REST API, Cassandra, Splunk, Docker, 
          Kubernetes, Tomcat 

      - job: "Software Engineer – Development"
        company: "GreenBox"
        companyUrl: "https://verifone.com"
        date: "Apr 2022 - Sept 2023"
        info:
          enable: true
        featuredLink:
          enable: true
          name: "Client: Verifone"
          url: "https://verifone.com"
        content: |
          The GreenBox eCom2 project involves developing a transaction REST API and related services for tracking billing 
          reports. This system is designed to integrate easily with other products, providing detailed transaction analytics and 
          reporting across multiple channels. 
          - Integration: eCom2 integrates with various products to track consumer billing reports based on their 
          requests. 
          - Transaction Analytics: It supports transaction analytics for all Point-of-Sale (POS), eCommerce (eCom), 
          and other channels, including APM transactions (e.g., PayPal, Klarna). 
          - Data Warehouse: Utilizes Snowflake for transaction analytics, processing transaction webhooks. 
          - Multiple Entities: The system supports several entities, including PDSP Transaction Consumer Service, 
          Event Service, and Entity Services, each handling different aspects of the transaction processing pipeline. 

          Responsibilities: 

          - Participated in requirement discussions and clarification sessions to ensure the system aligns with business 
          needs. 
          - Designed technical solutions to meet specified requirements. 
          - Developed Kafka producer and consumer applications for stream processing. 
          - Implemented REST APIs for seamless communication between services. 
          - Developed and implemented data streams and tasks, generating real-time billing reports. 
          - Created data pipelines to transfer data from microservices to Kafka, and then to the Snowflake data 
          warehouse for further analytics. 
          - Contributed to code reviews, ensuring adherence to best practices and high code quality across teams. 

          Technologies: 
          
          Spring Boot, Microservices, Kafka, RESTful Web Services, 
          Hibernate, PostgreSQL, Snowflake, ksqlDB, Tomcat, Kafka 
          Streams 

      - job: "Junior Software Engineer"
        company: "Payment Gateway"
        companyUrl: "https://girmiti.com"
        date: "May 2020 - Mar 2022"
        featuredLink:
          enable: true
          name: "Company: Girmiti Software Private Limited"
          url: "https://girmiti.com"
        content: |
          The Payment Gateway and Acquiring solution offers a feature-rich, flexible, and scalable solution for merchants, banks, 
          and service providers to efficiently capture and process customer transactions across multiple channels. 
           
          - Transactional Support: Includes Sale, Authorization (Auth), Refund, Reversal, Batch Settlement, and 
          Reconciliation. 
          - Payment Card Acceptance: Supports all standard payment scheme card types. 
          - Tokenization: Ensures sensitive customer information is not stored, enhancing security. 
          - Multiple Connectors: Facilitates upstream processing through various processors. 
          - Merchant and Terminal Management: Manages merchant and terminal configurations for seamless 
          operation. 

          Responsibilities: 

          - Analyzing business requirements, and participated in technical discussions for development and testing of 
          various modules assigned. 
          - Developed user interface modules using JSP, HTML5, CSS3, Bootstrap 4. 
          - Worked on Reactive forms, dynamic forms, Modules, Events, Services, Routing and Navigation. 
          - Written various business requirement functionalities using rest API.  
          - Developed transactional support – sale, auth, void, refund, settlement. 
          - Experienced using new features of tokenization so no to store any customer-sensitive information. 
          - Worked on responsive Bootstrap framework as part of application development.  
          - Worked on form validations and other complex validations as part of application development.  
          - Used Multithreading concepts, collection framework, Exception handling, and OOPs in Core Java. 
          - Used Spring MVC framework and implemented various spring annotations in Java classes. 
          - Used hibernate ORM for database connectivity, implemented Hibernate mapping files, and written SQL queries 
          for different modules. 
          - Worked on error logging levels using Log4j and solved the issues. 
          - Used Maven build to deploy the application into Tomcat Server. 
          - Experience in checking cross-browser compatibility and thoroughly performed unit testing and integration 
          testing.

          Technologies: 

          Java, Spring Boot, Microservices, Hibernate, RESTful Web 
          Services, MySQL, Maven, Tomcat, AWS, Docker, Jenkins, 
          Kafka  

      - job: "Trainee Software Engineer"
        company: "Loyalty System"
        companyUrl: "https://girmiti.com"
        date: "Dec 2019 - Apr 2020"
        featuredLink:
          enable: true
          name: "Company: Girmiti Software Private Limited"
          url: "https://girmiti.com"
        content: |-
          The Loyalty System consists of a loyalty portal and services, offering users a platform to earn and redeem points based 
          on their purchases. The system is designed to be secure, with services implemented using REST APIs and secured via 
          OAuth 2.0 authentication.

          - Points Tracking: Integrated with an issuance system to track points earned by consumers based on their 
          transaction amounts. 
          - Product Catalog: Allows the upload of a product catalog, enabling consumers to redeem products based on 
          accumulated points. 
          - Redemption API: APIs to enable consumers to redeem points and view available products in the catalog 
          once certain points thresholds are met. 
          - Consumer Portal: Redemption of points is facilitated through the consumer portal, where users can request 
          the product catalog and redeem points.

          Responsibilities: 

          - Actively participated in project flow discussions, understanding the system requirements and architecture. 
          - Analyzed the SoAware Requirement Specification (SRS) documents to gain a deeper understanding of the 
          project scope and design. 
          - Designed the format and structure of JSP (Java Server Pages) to enhance user experience in the portal. 
          - Developed and implemented REST APIs for key use cases such as point redemption and catalogue retrieval. 
          - Implemented functionality for sending email and SMS notifications for updates related to loyalty points and 
          redemption. 
          - Wrote and executed unit tests, ensuring thorough test coverage for the developed features. 

          Technologies: 
          
          Java, Spring MVC, Spring Boot, REST API, JSP, Hibernate, 
          Oracle, Maven, Tomcat, HTML, CSS, JavaScript, Bootstrap 

